model_list:
  - model_name: qwen3-coder
    litellm_params:
      model: openai/qwen3-coder
      api_base: http://vllm:8000/v1
      api_key: os.environ/VLLM_UPSTREAM_KEY
      # Dummy pricing so max_budget acts as a daily token quota.
      # $0.000001/token = $1 per 1M tokens, making budget values easy to reason about.
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000001

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
